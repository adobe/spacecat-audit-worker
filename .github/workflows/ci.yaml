name: CI

permissions:
  id-token: write
  contents: write
  issues: read
  pull-requests: write

on:
  push:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  ci:
    uses: adobe/mysticat-ci/.github/workflows/service-ci.yaml@v3
    with:
      service-name: audit-worker
      vpc-enabled: true
      bundle-build: true
    secrets: inherit
